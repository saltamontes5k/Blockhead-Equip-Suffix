[Settings]
; Set Logging=0 to disable diagnostic log output (default=1)
Logging=1

[EquipRaceGroups]
; Format: <group number>=<Race1>,<Race2>,...
; Race names must match the in-game display name (GetFullName).
; Group numbers 0-999 are appended directly to the filename before .nif
; e.g.  Greaves.nif  ->  Greaves_0.nif  for race group 0
0=Orc,Nord,Dremora
;1=Imperial,Breton,Redguard

[EquipNPCGroups]
; Format: <alias>=<FormID1>,<FormID2>,...
; The alias has an underscore prepended automatically in the filename.
; e.g. alias "pconly"  ->  Greaves_pconly.nif
pconly=00000007
;bigguys=00037FF8,000222B6

[EquipInvisible]
; NPC formIDs that should have equipment slots rendered invisible.
; No more specialist 'invisible' clothing nor suits
; Plain formID = hide all equipment slots (full invisibility).
; formID=Slot1,Slot2,... = hide all slots EXCEPT those listed.
;
; Slot names (case-insensitive):
;   Head(0) Hair(1) UpperBody(2) LowerBody(3) Hand(4) Foot(5)
;   RightRing(6) LeftRing(7) Amulet(8) Weapon(9)
;   BackWeapon(10) SideWeapon(11) Quiver(12) Shield(13)
;   Torch(14) Tail(15)
;
; Invisible swordsman — weapon/shield visible on invisible body:
; 000980E0=Weapon,BackWeapon,Shield
;
; Floating weapon — only weapon visible, everything else hidden:
; 000980E0=Weapon
;
; Fully invisible NPC (all slots):
; 000980E0
;
; Example NPC:
;000980E0=Weapon

