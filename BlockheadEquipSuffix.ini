[Settings]
; Set Logging=0 to disable diagnostic log output (default=1)
Logging=1

[EquipRaceGroups]
; Format: <group number>=<Race1>,<Race2>,...
; Race names must match the in-game display name (GetFullName).
; Group numbers 0-999 are appended directly to the filename before .nif
; e.g.  Greaves.nif  ->  Greaves_0.nif  for race group 0
;0=Orc,Nord,Dremora
;1=Imperial,Breton,Redguard
;2=HighElf,DarkElf,WoodElf
;3=Khajiit
;4=Argonian

[EquipNPCGroups]
; Format: <alias>=<FormID1>,<FormID2>,...
; The alias has an underscore prepended automatically in the filename.
; e.g. alias "pconly"  ->  Greaves_pconly.nif
;pconly=00000007
;bigguys=00037FF8,000222B6
